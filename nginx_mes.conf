# Nginx 設定檔範例 (MES 系統)
# 請將此檔案內容複製到 /etc/nginx/sites-available/mes
# 然後執行: sudo ln -s /etc/nginx/sites-available/mes /etc/nginx/sites-enabled/
# 並重新載入 Nginx: sudo systemctl reload nginx

server {
    listen 80;
    
    # 這裡請改成您伺服器對外的實際 IP 或內部網域 (例如: mes.company.local)
    server_name 您的伺服器IP或網域名稱;

    # 隱藏 Nginx 版本號，減少被針對性攻擊的風險
    server_tokens off;

    # 安全性 HTTP 標頭設定 (防止常見的跨站攻擊與點擊劫持)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 將所有請求轉發給後端的 Waitress 伺服器 (預設 5010 port)
    location / {
        proxy_pass http://127.0.0.1:5010;
        
        # 轉發真實的客戶端 IP 給後端 Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支援 (如果有使用 Socket.IO 等即時推播功能)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
